spring:
  application:
    name: shopping_mall_project

  datasource:
    url: jdbc:mysql://localhost:3305/shopping_mall?serverTimezone=Asia/Seoul&characterEncoding=UTF-8
    username: root
    password: 0724
    driver-class-name: com.mysql.cj.jdbc.Driver

  jpa:
    hibernate:
      ddl-auto: update
    properties:
      hibernate:
        format_sql: true
    open-in-view: false
